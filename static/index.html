<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT Service - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Main Layout */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar (Controls) */
        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Editor Area */
        .editor-container {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #ffffff;
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .editor-toolbar {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fbfcfe;
        }

        #resultText {
            flex: 1;
            width: 100%;
            padding: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.7;
            border: none;
            outline: none;
            resize: none;
            color: #334155;
        }

        /* Custom Components */
        .btn {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg);
        }

        .btn-record {
            background: white;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-record.active {
            background: var(--danger);
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
        }

        .dot.active {
            background: var(--success);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        .dot.processing {
            background: var(--primary);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.4;
            }
        }

        /* Hidden File Input */
        #fileInput {
            display: none;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                <line x1="12" y1="19" x2="12" y2="22" />
            </svg>
            stt-service
        </div>
        <div class="status">
            <div id="statusDot" class="dot active"></div>
            <span id="statusText">System Ready</span>
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="control-group">
                <p class="section-title">New Transcription</p>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    Upload Audio File
                </button>
                <input type="file" id="fileInput" accept="audio/*">

                <button id="recordBtn" class="btn btn-record">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <circle cx="12" cy="12" r="6" />
                    </svg>
                    <span id="recordBtnText">Record Live Mic</span>
                </button>
                <p id="timer" style="text-align: center; color: var(--text-secondary); font-size: 0.875rem;">00:00</p>
            </div>

            <div class="control-group">
                <p class="section-title">About Service</p>
                <p style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">
                    Using Faster-Whisper (OpenAI Whisper re-implementation) for high-speed transcription. Supports MP3,
                    WAV, M4A.
                </p>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-wrapper">
                <div class="editor-toolbar">
                    <span style="font-size: 0.875rem; font-weight: 500; color: var(--text-secondary);">Transcription
                        Result</span>
                    <button class="btn btn-outline" style="padding: 4px 10px; font-size: 0.8rem;" onclick="copyText()">
                        Copy Text
                    </button>
                </div>
                <textarea id="resultText" placeholder="Start by uploading a file or recording your voice..."></textarea>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const recordBtn = document.getElementById('recordBtn');
        const recordBtnText = document.getElementById('recordBtnText');
        const resultText = document.getElementById('resultText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const timerLabel = document.getElementById('timer');

        let mediaRecorder;
        let audioChunks = [];
        let startTime;
        let timerInterval;

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) uploadAudio(file);
        };

        recordBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                stopRecording();
            } else {
                startRecording();
            }
        };

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const file = new File([audioBlob], "recording.wav", { type: 'audio/wav' });
                    uploadAudio(file);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                recordBtn.classList.add('active');
                recordBtnText.innerText = "Stop Recording";

                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
            } catch (err) {
                alert("Microphone access denied.");
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            recordBtn.classList.remove('active');
            recordBtnText.innerText = "Record Live Mic";
            clearInterval(timerInterval);
            timerLabel.innerText = "00:00";
        }

        function updateTimer() {
            const seconds = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            timerLabel.innerText = `${m}:${s}`;
        }

        async function uploadAudio(file) {
            const formData = new FormData();
            formData.append('file', file);

            setLoading(true);

            try {
                const response = await fetch('/api/v1/transcribe/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultText.value = data.transcription;
                    setLoading(false, "Success");
                } else {
                    alert(data.detail || "Error transcribing");
                    setLoading(false, "Error");
                }
            } catch (err) {
                alert("Connection failed");
                setLoading(false, "Ready");
            }
        }

        function setLoading(isLoading, text = "Ready") {
            if (isLoading) {
                statusDot.className = "dot processing";
                statusText.innerText = "Processing Audio...";
            } else {
                statusDot.className = "dot active";
                statusText.innerText = `System ${text}`;
            }
        }

        function copyText() {
            resultText.select();
            document.execCommand('copy');
            const originalText = statusText.innerText;
            statusText.innerText = "Copied to Clipboard!";
            setTimeout(() => statusText.innerText = originalText, 2000);
        }
    </script>
</body>

</html>
